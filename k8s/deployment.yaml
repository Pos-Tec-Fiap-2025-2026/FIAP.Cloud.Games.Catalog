apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-deployment
  labels:
    app: catalog-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-api
  template:
    metadata:
      labels:
        app: catalog-api
    spec:
      containers:
        - name: catalog-api
          image: catalog-api:latest
          imagePullPolicy: IfNotPresent 
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: catalog-config
          env:
            - name: bus__password
              valueFrom:
                secretKeyRef:
                  name: catalog-secret
                  key: bus__password